name: F1 Data Auto-Updater

on:
  schedule:
    # Runs every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:
    # Allows manual triggering

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r oracle_cloud_updater/requirements.txt

      - name: Run Updater
        env:
          DEST: github
          GITHUB_DATA_REPO: https://github.com/${{ github.repository_owner }}/f1database-2024-now.git
          GITHUB_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
          SEASONS: 2024,2025,2026
          REFRESH_DAYS: 2
          MAX_PER_RUN: 3
          TELEMETRY_WORKERS: 4
        run: |
          python oracle_cloud_updater/updater.py

